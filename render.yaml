services:
  - type: web
    name: path-planning-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: >-
      pip install -r requirements.txt &&
      python -c "from app.graph_loader import get_graph; get_graph('prayagraj'); get_graph('gwalior')"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
